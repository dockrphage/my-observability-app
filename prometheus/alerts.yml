groups:
  - name: app_alerts
    interval: 30s
    rules:
      # Alert when app is down
      - alert: AppDown
        expr: up{job="my-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: my-app
        annotations:
          summary: "Application is down"
          description: "The app has been unreachable for more than 1 minute"
          dashboard: "http://grafana:3001/d/my-app-dashboard"

      # Alert when request rate is high
      - alert: HighRequestRate
        expr: rate(http_requests_total[5m]) > 100
        for: 2m
        labels:
          severity: warning
          service: my-app
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value }} req/sec, above 100 req/sec"

      # Alert when error rate is high
      - alert: HighErrorRate
        expr: rate(http_requests_total{status_code="500"}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: my-app
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}"

      # Alert when app is slow
      - alert: SlowResponses
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
          service: my-app
        annotations:
          summary: "Slow response times"
          description: "95th percentile response time is {{ $value }}s"

      # Alert when memory usage is high
      - alert: HighMemoryUsage
        expr: nodejs_heap_size_total_bytes / nodejs_memory_working_set_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: my-app
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"
