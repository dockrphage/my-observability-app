# Nginx configuration
events {
    worker_connections 1024;
}

http {
    # Define the app server
    upstream app {
        server app:3000;
    }

    # Main server block
    server {
        listen 80;
        
        # Forward all requests to the app
        location / {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
